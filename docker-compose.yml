services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - lifeos_data:/data
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  lifeos_data:
