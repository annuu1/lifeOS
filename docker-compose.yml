services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - lifeos_data:/data
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    restart: always

volumes:
  lifeos_data:
